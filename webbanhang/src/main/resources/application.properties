# ==========================================
# APPLICATION CONFIG
# ==========================================
spring.application.name=webbanhang
server.port=8080
server.servlet.context-path=/api

# ==========================================
# SQL SERVER DATASOURCE
# ==========================================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=WebBanHang;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ==========================================
# JPA / HIBERNATE
# ==========================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# T?t Open Session in View
spring.jpa.open-in-view=false

# ==========================================
# JWT CONFIG
# ==========================================
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# ==========================================
# FILE UPLOAD
# ==========================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
app.upload.dir=uploads

# ==========================================
# LOGGING
# ==========================================
logging.level.com.webbanhang=DEBUG
logging.level.org.springframework.security=INFO